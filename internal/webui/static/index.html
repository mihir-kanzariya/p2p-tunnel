<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Tunnel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a; color: #e5e5e5;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .container { max-width: 600px; width: 100%; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .status {
      background: #111; border: 1px solid #333; border-radius: 12px;
      padding: 20px; margin-bottom: 16px;
    }
    .status-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 8px; background: #666;
    }
    .status-dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .log {
      background: #111; border: 1px solid #333; border-radius: 12px;
      padding: 16px; font-family: monospace; font-size: 0.8rem;
      max-height: 200px; overflow-y: auto; color: #888;
    }
    .log-entry { padding: 2px 0; }
    .log-entry.info { color: #60a5fa; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
    #content-frame {
      width: 100%; border: 1px solid #333; border-radius: 12px;
      background: #fff; margin-top: 16px; min-height: 400px; display: none;
    }
    .manual {
      background: #111; border: 1px solid #333; border-radius: 12px;
      padding: 20px; margin-top: 16px;
    }
    .manual input {
      width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #444;
      border-radius: 8px; color: #fff; font-family: monospace; font-size: 0.85rem;
      margin: 8px 0;
    }
    .manual button {
      padding: 10px 20px; background: #2563eb; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    }
    .manual button:hover { background: #1d4ed8; }
  </style>
  <script type="module" crossorigin src="/assets/index-CsM3GS0E.js"></script>
</head>
<body>
  <div class="container">
    <h1>P2P Tunnel</h1>
    <p class="subtitle">Connecting to peer via the libp2p network...</p>

    <div class="status">
      <span class="status-dot connecting" id="dot"></span>
      <span id="status-text">Initializing...</span>
    </div>

    <div class="log" id="log"></div>

    <iframe id="content-frame" sandbox="allow-scripts allow-same-origin"></iframe>

    <div class="manual" id="manual-connect" style="display:none">
      <p style="margin-bottom: 8px; color: #ccc;">Or enter a peer multiaddr manually:</p>
      <input type="text" id="addr-input" placeholder="/ip4/.../tcp/.../ws/p2p/12D3KooW...">
      <button onclick="connectManual()">Connect</button>
    </div>
  </div>

</body>
</html>
